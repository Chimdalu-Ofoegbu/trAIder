# Alembic configuration for trAIder — single Alembic tree managing both
# `orchestrator` and `backend` schemas in the `traider` database.
# See migrations/README.md for the single-tree rationale and `make db-reset` workflow.

[alembic]
# Database URL is read from the DATABASE_URL environment variable.
# The env.py reads this variable; do NOT hard-code credentials here.
# Example local dev URL (set in shell, NOT committed):
#   DATABASE_URL=postgresql+psycopg://migrator_user:migrator_pass@localhost:5432/traider
# env.py uses sqlalchemy.engine_from_config with this key:
script_location = %(here)s
# Exclude migrations root dir from being treated as the versions dir;
# the actual versions/ folder is set by version_locations below.
# sqlalchemy.url is intentionally left blank; env.py reads DATABASE_URL from os.environ.
sqlalchemy.url =

# The version file is named {rev}_{slug}.py
file_template = %%(rev)s_%%(slug)s

# Timezone for generated timestamps
timezone = UTC

# max column width in output tables
output_encoding = utf-8

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
