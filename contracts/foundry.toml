# =============================================================================
# trAIder — contracts/foundry.toml
# Three profiles (D-28): default / coverage / fork
# Compiler: solc 0.8.24 + evm_version cancun (Arbitrum supports Cancun opcodes)
# =============================================================================

[profile.default]
src = "src"
out = "out"
libs = ["lib"]
solc = "0.8.24"
evm_version = "cancun"
via_ir = true
optimizer = true
optimizer_runs = 200
fuzz = { runs = 256 }
invariant = { runs = 32, depth = 64 }

# Per-test override for money-critical math (D-29):
# Use: /// forge-config: default.fuzz.runs = 1000
# on NAV calc, mTOKEN mint/burn at NAV, arbitrage round-trip solvency tests.

[profile.coverage]
# forge coverage is incompatible with via_ir (foundry-rs/foundry#6592)
# MUST disable via_ir for coverage runs; all other settings preserved.
via_ir = false
optimizer = false
fuzz = { runs = 16 }

[profile.fork]
# Fork profile: pinned Arbitrum One block for deterministic replay (D-39)
# FORK_BLOCK = 353000000 (pinned 2026-06-01; bump only on dep-contract upgrade)
via_ir = true
fork_block_number = 353000000

[rpc_endpoints]
# ARB_RPC: Alchemy Arbitrum One archive URL (USER SETUP — populate .env with real key)
arbitrum = "${ARB_RPC}"
# SEPOLIA_RPC: Alchemy Arbitrum Sepolia URL (USER SETUP — populate .env with real key)
arbitrum_sepolia = "${SEPOLIA_RPC}"

[etherscan]
# ARBISCAN_API_KEY: Arbiscan API key for auto-verification (USER SETUP — populate .env)
# Chain ID 421614 is Arbitrum Sepolia testnet.
arbitrum-sepolia = { key = "${ARBISCAN_API_KEY}", url = "https://api-sepolia.arbiscan.io/api", chain = 421614 }

# See more config options: https://github.com/foundry-rs/foundry/blob/master/crates/config/README.md#all-options
