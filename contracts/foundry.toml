# =============================================================================
# trAIder — contracts/foundry.toml
# Three profiles (D-28): default / coverage / fork
# Compiler: solc 0.8.24 + evm_version cancun (Arbitrum supports Cancun opcodes)
# =============================================================================

[profile.default]
src = "src"
out = "out"
libs = ["lib"]
solc = "0.8.24"
evm_version = "cancun"
via_ir = true
optimizer = true
optimizer_runs = 200
fuzz = { runs = 256 }
invariant = { runs = 32, depth = 64 }
# fs_permissions: allow deploy script to read the idempotency manifest and write the address manifest (D-14).
# Paths are relative to this foundry.toml (i.e., contracts/). The deployments/ dir lives at repo root.
fs_permissions = [
  { access = "read-write", path = "../deployments/" },
]

# Per-test override for money-critical math (D-29):
# Use: /// forge-config: default.fuzz.runs = 1000
# on NAV calc, mTOKEN mint/burn at NAV, arbitrage round-trip solvency tests.

[profile.coverage]
# forge coverage is incompatible with via_ir (foundry-rs/foundry#6592)
# MUST disable via_ir for coverage runs; all other settings preserved.
via_ir = false
optimizer = false
fuzz = { runs = 16 }

[profile.fork]
# Fork profile: pinned Arbitrum One block for deterministic replay (D-39)
# FORK_BLOCK = 353000000 (pinned 2026-06-01; bump only on dep-contract upgrade)
# NOTE: Do NOT use this profile for GMX fork tests — GMX V2 contracts were
# redeployed after block ~401000000. Use the [profile.gmx-fork] profile instead.
via_ir = true
fork_block_number = 353000000

[profile.gmx-fork]
# GMX-specific fork profile: block >= 402000000 required.
# Decision 00-00 FORK_BLOCK=353000000 is SUPERSEDED for GMX tests (03-01 spike).
# GMX V2 ExchangeRouter/Reader/OrderHandler redeployed after block ~401000000.
# At block 353000000 those addresses have NO code — a false-green trap.
# Use: FOUNDRY_PROFILE=gmx-fork forge test --match-path "test/fork/GMXAdapterForkTest.t.sol" --fork-url $ARB_RPC
via_ir = true
fork_block_number = 405000000

[rpc_endpoints]
# ARB_RPC: Alchemy Arbitrum One archive URL (USER SETUP — populate .env with real key)
arbitrum = "${ARB_RPC}"
# SEPOLIA_RPC: Alchemy Arbitrum Sepolia URL (USER SETUP — populate .env with real key)
arbitrum_sepolia = "${SEPOLIA_RPC}"

[etherscan]
# ARBISCAN_API_KEY: Arbiscan API key for auto-verification (USER SETUP — populate .env)
# Chain ID 421614 is Arbitrum Sepolia testnet.
# Etherscan V2 unified endpoint (V1 api-sepolia.arbiscan.io deprecated).
arbitrum-sepolia = { key = "${ARBISCAN_API_KEY}", url = "https://api.etherscan.io/v2/api", chain = 421614 }

# See more config options: https://github.com/foundry-rs/foundry/blob/master/crates/config/README.md#all-options
